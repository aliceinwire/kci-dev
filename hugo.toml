baseURL = 'https://kci.dev/'
languageCode = 'en-us'
title = 'kci-dev'
description = 'Stand alone tool for Linux Kernel developers and maintainers to interact with KernelCI'
contentDir = "docs/"

[minify]
  disableXML = true
  minifyOutput = true

[params]
  ShowReadingTime = true
  ShowShareButtons = true
  ShowToc = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  useHLJS = true
  defaultTheme = "auto"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = [ "title", "permalink", "summary", "content" ]

[menu]
  [[menu.main]]
    name = "Home"
    pageRef = "/"
    weight = 10

  [[menu.main]]
    name = "checkout"
    pageRef = "checkout/"
    weight = 20
  
  [[menu.main]]
    name = "config"
    pageRef = "config/"
    weight = 20
  
  [[menu.main]]
    name = "config_file"
    pageRef = "config_file/"
    weight = 20

  [[menu.main]]
    name = "testretry"
    pageRef = "testretry/"
    weight = 20

  [[menu.main]]
    name = "results"
    url = "results/"
    weight = 20
  
  [[menu.main]]
    name = "maestro-results"
    url = "maestro-results/"
    weight = 20

  [[menu.main]]
    identifier = "search"
    name = "🔍search"
    url = "/search/"
    weight = 30

[outputs]
home = [ "HTML", "RSS", "JSON" ]
